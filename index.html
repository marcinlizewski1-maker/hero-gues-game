<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeroGuess - Quiz o bohaterach Marvel i DC</title>
  <meta name="description" content="Nowoczesna gra webowa z trybami Classic, Fight, Power, Lore i Daily Challenge dla fanow Marvel i DC.">
  <meta name="keywords" content="superheroes, Marvel, DC, game, guessing, fun">
  <meta name="robots" content="index, follow">
  <meta name="google-site-verification" content="2TvGM4f-XaJVADJAYvvSopb9QnRGgvRoauRSBxNSYxI" />
  <link rel="canonical" href="https://hero-gues-game.vercel.app/" id="canonicalLink">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PCC42EXF2N"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-PCC42EXF2N');
</script>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <p class="eyebrow">Interactive Mode Selector</p>
      <h1>Choose your path.</h1>
      <p class="hero-copy">
        HeroGuess z trybami gry, leaderboardem i systemem kont uzytkownikow.
      </p>
      <div class="leaderboard-controls">
        <label for="nicknameInput">Profil w grze</label>
        <input id="nicknameInput" type="text" maxlength="24" placeholder="Guest albo zalogowany uzytkownik">
      </div>
      <div id="accountSummary"></div>
      <div class="progress-panel" id="progressPanel"></div>
      <button class="home-button" id="homeButton" type="button" hidden>
        Wroc do menu
      </button>
    </header>

    <main class="game-layout">
      <nav class="menu-panel" aria-label="Main menu" id="menuView">
        <button class="mode-card" type="button" data-mode-id="classic">
          <span class="mode-card-title">Classic</span>
          <span class="mode-card-copy">Zgadywanie bohatera na podstawie cech.</span>
        </button>
        <button class="mode-card" type="button" data-mode-id="fight">
          <span class="mode-card-title">Fight</span>
          <span class="mode-card-copy">Tryb walki z miejscem na statystyki i akcje.</span>
        </button>
        <button class="mode-card" type="button" data-mode-id="power">
          <span class="mode-card-title">Power</span>
          <span class="mode-card-copy">Panel mocy, ulepszen i efektow specjalnych.</span>
        </button>
        <button class="mode-card" type="button" data-mode-id="lore">
          <span class="mode-card-title">Lore</span>
          <span class="mode-card-copy">Sekcja fabuly, frakcji i historii swiata.</span>
        </button>
        <button class="mode-card" type="button" data-mode-id="daily">
          <span class="mode-card-title">Daily</span>
          <span class="mode-card-copy">Jedno wspolne wyzwanie dziennie dla wszystkich.</span>
        </button>
      </nav>
      <section
        class="content-panel"
        id="gameContainer"
        aria-live="polite"
        aria-label="Game content area"
      >
        <div class="placeholder-menu">
          <div>
            <div class="mode-badge">Main Menu</div>
            <h2 class="mode-title">Wybierz tryb gry z panelu po lewej.</h2>
            <p>
              Menu i kontener sa renderowane od razu w HTML, a JavaScript przejmuje obsluge
              przelaczania widokow po zaladowaniu aplikacji.
            </p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script defer src="./app.js"></script>
</body>
</html>
